name: E2E Tests

# Triggered by Vercel when a preview deployment succeeds.
# Vercel sends a repository_dispatch event with the deployment URL
# in the payload. See: https://vercel.com/docs/git/vercel-for-github
#
# Also supports manual triggering for testing the workflow itself.

on:
  repository_dispatch:
    types:
      - "vercel.deployment.success"
  workflow_dispatch:

# Cancel in-progress runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.event.client_payload.git.ref || github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright E2E
    # Only run for preview deployments (not production) or manual triggers
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'repository_dispatch' &&
       github.event.client_payload.environment == 'preview')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      # repository_dispatch sets GITHUB_SHA to default branch HEAD,
      # not the PR commit. Vercel's checkout action extracts the
      # correct SHA from the event payload.
      - uses: vercel/repository-dispatch/actions/checkout@v1
        if: github.event_name == 'repository_dispatch'

      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm --filter @bnto/web exec playwright install chromium --with-deps

      - name: Run E2E tests
        run: pnpm --filter @bnto/web exec playwright test
        env:
          BASE_URL: ${{ github.event.client_payload.url || '' }}
          VERCEL_AUTOMATION_BYPASS_SECRET: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7
