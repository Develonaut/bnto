name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go (vet + build + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libwebp-dev

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: |
            archive/engine-go/go.sum
            archive/api-go/go.sum

      - name: go vet
        run: |
          go vet ./archive/engine-go/...
          go vet ./archive/api-go/...

      - name: Build engine CLI
        run: cd archive/engine-go && go build -o /dev/null ./cmd/bnto/

      - name: Build API server
        run: cd archive/api-go && go build -o /dev/null ./cmd/api/

      - name: Engine tests
        run: cd archive/engine-go && go test -race ./...

      - name: API tests
        run: go test -race ./archive/api-go/...

  rust:
    name: Rust (fmt + lint + unit + WASM integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: engine
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: engine

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Unit tests (native)
        run: cargo test --workspace

      - name: WASM integration tests (Node.js)
        run: |
          wasm-pack test --node crates/bnto-wasm
          wasm-pack test --node crates/bnto-csv
          wasm-pack test --node crates/bnto-file
          wasm-pack test --node crates/bnto-image

  typescript:
    name: TypeScript (build + lint + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Lint
        run: pnpm turbo run lint

      - name: Test
        run: pnpm turbo run test

  # Gate job — single status check for branch protection and Vercel
  ci-gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [go, rust, typescript]
    if: always()
    steps:
      - name: Check job results
        run: |
          if [ "${{ needs.go.result }}" != "success" ] || \
             [ "${{ needs.rust.result }}" != "success" ] || \
             [ "${{ needs.typescript.result }}" != "success" ]; then
            echo "One or more CI jobs failed:"
            echo "  Go:         ${{ needs.go.result }}"
            echo "  Rust:       ${{ needs.rust.result }}"
            echo "  TypeScript: ${{ needs.typescript.result }}"
            exit 1
          fi
          echo "All CI jobs passed."
