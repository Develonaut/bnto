name: Lighthouse CI

on:
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CONVEX_URL: https://zealous-canary-422.convex.cloud
      NEXT_PUBLIC_CONVEX_SITE_URL: https://zealous-canary-422.convex.site
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build all packages in dependency order (same as CI)
      - name: "Build: @bnto/nodes"
        run: pnpm --filter @bnto/nodes run build

      - name: "Build: @bnto/auth"
        run: pnpm --filter @bnto/auth run build

      - name: "Build: @bnto/backend"
        run: pnpm --filter @bnto/backend run build

      - name: "Build: @bnto/core"
        run: pnpm --filter @bnto/core run build

      - name: "Build: @bnto/web"
        run: pnpm --filter @bnto/web run build

      - name: Lighthouse CI
        id: lhci
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Format results
        if: always() && steps.lhci.outcome != 'skipped'
        uses: actions/github-script@v7
        with:
          script: |
            const links = ${{ steps.lhci.outputs.links }};
            const results = ${{ steps.lhci.outputs.manifest }};
            if (!results || !results.length) return;

            const rows = results.map(r => {
              const url = new URL(r.url);
              const path = url.pathname === '/' ? '/' : url.pathname;
              const perf = Math.round(r.summary.performance * 100);
              const a11y = Math.round(r.summary.accessibility * 100);
              const bp = Math.round(r.summary['best-practices'] * 100);
              const seo = Math.round(r.summary.seo * 100);
              const link = links[r.url] || '';
              const name = link ? `[${path}](${link})` : path;
              return `| ${name} | ${perf} | ${a11y} | ${bp} | ${seo} |`;
            });

            const summary = [
              '### Lighthouse Results',
              '',
              '| URL | Performance | Accessibility | Best Practices | SEO |',
              '|-----|------------|---------------|----------------|-----|',
              ...rows,
            ].join('\n');

            core.summary.addRaw(summary);
            await core.summary.write();
