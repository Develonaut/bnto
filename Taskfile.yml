version: '3'

tasks:
  # Go tasks (engine/)
  build:
    desc: Build the bento CLI binary
    dir: ./engine
    cmds: [go build ./cmd/bento]

  test:
    desc: Run all Go tests with race detector
    dir: ./engine
    cmds: [go test -race ./...]

  test:engine:
    desc: Run engine tests only (excludes TUI and integration)
    dir: ./engine
    cmds:
      - go test -race ./cmd/... ./pkg/engine/... ./pkg/logger/... ./pkg/logs/... ./pkg/node/... ./pkg/paths/... ./pkg/registry/... ./pkg/secrets/... ./pkg/storage/... ./pkg/validator/... ./tests/mocks/...

  test:integration:
    desc: Run integration tests (auto-builds bento binary)
    dir: ./engine
    cmds: [go test -race -v ./tests/integration/...]

  install:
    desc: Install bento binary to $GOPATH/bin
    dir: ./engine
    cmds: [go install ./cmd/bento]

  vet:
    desc: Run go vet on all packages
    dir: ./engine
    cmds: [go vet ./...]

  # Frontend tasks
  ui:build:
    desc: Build all frontend packages
    cmds: [pnpm turbo run build]

  ui:dev:
    desc: Start the web app in dev mode
    cmds: [pnpm --filter @bento/web dev]

  ui:test:
    desc: Run all frontend tests
    cmds: [pnpm turbo run test]

  ui:lint:
    desc: Lint all frontend packages
    cmds: [pnpm turbo run lint]

  # Quality gate
  check:
    desc: Run all quality checks (vet, test with coverage, build)
    dir: ./engine
    cmds:
      - echo "=== go vet ==="
      - go vet ./...
      - echo "=== go test -race -cover ==="
      - go test -race -coverprofile=coverage.out ./...
      - go tool cover -func=coverage.out | tail -1
      - rm coverage.out
      - echo "=== go build ==="
      - go build ./cmd/bento
      - echo "=== all checks passed ==="

  # Cross-cutting
  build:all:
    desc: Build everything (engine + frontend)
    cmds:
      - task: build
      - task: ui:build

  test:all:
    desc: Test everything (engine + frontend)
    cmds:
      - task: test
      - task: ui:test
