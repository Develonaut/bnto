version: '3'

tasks:
  # Go tasks (engine/)
  build:
    desc: Build the bnto CLI binary
    dir: ./engine
    cmds: [go build ./cmd/bnto]

  test:
    desc: Run all Go tests with race detector
    dir: ./engine
    cmds: [go test -race ./...]

  test:engine:
    desc: Run engine tests only (excludes TUI and integration)
    dir: ./engine
    cmds:
      - go test -race ./cmd/... ./pkg/engine/... ./pkg/logger/... ./pkg/logs/... ./pkg/node/... ./pkg/paths/... ./pkg/registry/... ./pkg/secrets/... ./pkg/storage/... ./pkg/validator/... ./tests/mocks/...

  test:integration:
    desc: Run integration tests (auto-builds bnto binary)
    dir: ./engine
    cmds: [go test -race -v ./tests/integration/...]

  install:
    desc: Install bnto binary to $GOPATH/bin
    dir: ./engine
    cmds: [go install ./cmd/bnto]

  vet:
    desc: Run go vet on all Go packages
    cmds:
      - go vet ./engine/...
      - go vet ./apps/api/...

  # API server tasks
  api:dev:
    desc: Run Go API server locally (port 8080)
    dir: ./apps/api
    dotenv: ['../../.env.development']
    cmds: [go run ./cmd/server]

  api:tunnel:
    desc: Start Cloudflare tunnel (exposes local API at api-dev.bnto.io)
    cmds: [cloudflared tunnel run bnto-dev]

  api:test:
    desc: Run API server tests with race detector
    cmds: [go test -race ./apps/api/...]

  api:build:
    desc: Build the API server binary
    dir: ./apps/api
    cmds: [go build ./cmd/server]

  # Frontend tasks
  ui:build:
    desc: Build all frontend packages
    cmds: [pnpm turbo run build]

  ui:dev:
    desc: Start the web app in dev mode (port 4000)
    cmds: [pnpm --filter @bnto/web dev]

  dev:
    desc: Start all dev servers (Next.js on port 4000 + Convex)
    cmds: [pnpm turbo run dev]

  dev:all:
    desc: Start everything for local dev (web + Convex + Go API + tunnel)
    deps: [dev, api:dev, api:tunnel]

  ui:test:
    desc: Run all frontend tests
    cmds: [pnpm turbo run test]

  ui:lint:
    desc: Lint all frontend packages
    cmds: [pnpm turbo run lint]

  # Core integration tests (requires task dev:all running)
  core:integration:
    desc: Run @bnto/core integration tests against real Convex dev
    cmds: [pnpm --filter @bnto/core test:integration]

  # Quality gate
  check:
    desc: Run all quality checks (vet, test with coverage, build)
    cmds:
      - echo "=== go vet ==="
      - task: vet
      - echo "=== engine tests ==="
      - cd engine && go test -race -coverprofile=coverage.out ./...
      - go tool cover -func=engine/coverage.out | tail -1
      - rm engine/coverage.out
      - echo "=== api tests ==="
      - go test -race ./apps/api/...
      - echo "=== go build ==="
      - cd engine && go build ./cmd/bnto
      - cd apps/api && go build ./cmd/server
      - echo "=== all checks passed ==="

  # Menu generation
  menu:generate:
    desc: Generate menu JSON from engine for web app
    cmds:
      - cd engine && go run ./cmd/bnto menu --json > ../apps/web/lib/generated/menu.json

  # E2E tests
  e2e:
    desc: Run Playwright E2E tests (headless, UI-only — no backend required)
    dir: ./apps/web
    cmds: [pnpm exec playwright test]

  e2e:integration:
    desc: Run full-stack integration E2E tests (requires task dev:all running)
    dir: ./apps/web
    cmds: [pnpm exec playwright test --config=playwright.integration.config.ts]

  # R2 dev cleanup
  r2:cleanup-dev:
    desc: Purge all objects from the dev R2 transit bucket
    dir: ./packages/@bnto/backend
    cmds:
      - npx convex run cleanup:purgeAll '{}'

  # WASM tasks (engine-wasm/)
  wasm:build:
    desc: Build WASM entry point via wasm-pack (release, web target)
    dir: ./engine-wasm
    cmds:
      # Only the cdylib entry point crate (bnto-wasm) gets wasm-pack built.
      # Node crates (bnto-image, etc.) are rlib — they compile into the
      # entry point's .wasm binary, not as separate modules.
      - /Users/ryan/.cargo/bin/wasm-pack build --target web --release crates/bnto-wasm

  wasm:build:dev:
    desc: Build WASM entry point in dev mode (faster, larger binary, better errors)
    dir: ./engine-wasm
    cmds:
      - /Users/ryan/.cargo/bin/wasm-pack build --target web --dev crates/bnto-wasm

  wasm:test:
    desc: Run Rust unit tests (native) + WASM integration tests (Node.js)
    dir: ./engine-wasm
    cmds:
      - cargo test --workspace
      - /Users/ryan/.cargo/bin/wasm-pack test --node crates/bnto-wasm

  wasm:test:unit:
    desc: Run Rust unit tests only (native, fast)
    dir: ./engine-wasm
    cmds:
      - cargo test --workspace

  wasm:lint:
    desc: Run clippy (Rust linter) on all WASM crates
    dir: ./engine-wasm
    cmds:
      - cargo clippy --workspace --all-targets -- -D warnings

  wasm:fmt:
    desc: Format all Rust code
    dir: ./engine-wasm
    cmds:
      - cargo fmt --all

  wasm:fmt:check:
    desc: Check Rust formatting without changes (CI)
    dir: ./engine-wasm
    cmds:
      - cargo fmt --all -- --check

  wasm:copy:
    desc: Copy WASM build output to web app public directory
    cmds:
      - cp engine-wasm/crates/bnto-wasm/pkg/bnto_wasm_bg.wasm apps/web/public/wasm/bnto_wasm_bg.wasm
      - cp engine-wasm/crates/bnto-wasm/pkg/bnto_wasm.js apps/web/public/wasm/bnto_wasm.js

  wasm:deploy:
    desc: Build WASM and copy to web app (full pipeline)
    cmds:
      - task: wasm:build
      - task: wasm:copy

  wasm:clean:
    desc: Clean all Rust build artifacts
    dir: ./engine-wasm
    cmds:
      - cargo clean

  # Cross-cutting
  build:all:
    desc: Build everything (engine + API + frontend)
    cmds:
      - task: build
      - task: api:build
      - task: ui:build

  test:all:
    desc: Test everything (engine + API + frontend)
    cmds:
      - task: test
      - task: api:test
      - task: ui:test
